services:

  services_controller:
    build:
      context: .
      target: runtime
    image: ${RUN_IMAGE:-services-controller}
    restart: unless-stopped
    command: ["bot"]            # run the Telegram bot; omit for the one-shot CLI
    env_file:
      - .env                    # copy .env.example → .env and fill in your values
    environment:
      ALIAS_CONFIG: /config/aliases.yaml
      RUST_LOG: services_controller=info
    volumes:
      # Your alias → service-directory map. Copy aliases.example.yaml → aliases.yaml.
      - ./aliases.yaml:/config/aliases.yaml:ro
      # The host Docker socket — the controller runs `docker compose` against it.
      - /var/run/docker.sock:/var/run/docker.sock
      # The host tree holding your per-service compose projects, mounted at the
      # SAME paths your aliases reference (e.g. /srv/web → /srv/web).
      - ${SERVICES_ROOT:-/srv}:${SERVICES_ROOT:-/srv}
