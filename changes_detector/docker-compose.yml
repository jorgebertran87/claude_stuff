services:

  changes_detector:
    image: ${RUN_IMAGE:-changes-detector}
    restart: unless-stopped
    env_file:
      - .env           # copy .env.example → .env and fill in your values
    volumes:
      - changes_state:/data
    environment:
      RUST_LOG: changes_detector=info
    depends_on:
      chrome:
        condition: service_healthy
      flaresolverr:
        condition: service_healthy

  # Headless Chrome — used by BrowserSource monitors.
  chrome:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb          # prevents Chrome from crashing on complex pages
    environment:
      SE_NODE_MAX_SESSIONS: 1
      SE_SESSION_REQUEST_TIMEOUT: 60
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4444/status"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # FlareSolverr — bypasses Cloudflare JS challenges.
  # Used by FlareSolverSource monitors (source_type = flare).
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  changes_state:
