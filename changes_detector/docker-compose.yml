services:
  changes_detector:
    build: .
    restart: unless-stopped

    env_file:
      - .env           # copy .env.example → .env and fill in your values

    volumes:
      # Persist detector state across container restarts.
      - changes_state:/data
      # Uncomment if using FileSource (MONITOR_TARGET is a local path):
      # - ${MONITOR_FILE_HOST:-./watched/example.txt}:/watched/target.txt:ro

    environment:
      RUST_LOG: changes_detector=info

volumes:
  changes_state:
