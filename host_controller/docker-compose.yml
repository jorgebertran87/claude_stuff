services:

  host_controller:
    build:
      context: .
      target: runtime
    image: ${RUN_IMAGE:-host-controller}
    restart: unless-stopped
    command: ["bot"]
    env_file:
      - .env                    # copy .env.example → .env and fill in your values
    environment:
      RUST_LOG: host_controller=info
    # Make the parent host reachable as host.docker.internal from the container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Read-only SSH private key used to log in to the host as the non-root
      # bot user. Generate it on the host and authorize the public half.
      - ./secrets/id_ed25519:/secrets/id_ed25519:ro
      # known_hosts pinning the host's public key (host-key verification).
      - ./secrets/known_hosts:/secrets/known_hosts:ro
