# SearXNG configuration for voice-assistant internal search.
# Inherits all default engine settings, enables JSON API, and disables
# the rate limiter since SearXNG is only accessed from the local host.
use_default_settings: true

search:
  formats:
    - html
    - json

server:
  secret_key: "voice-assistant-searxng-internal"
  limiter: false
  image_proxy: false

engines:
  - name: google
    disabled: false
  - name: brave
    disabled: true
  - name: duckduckgo
    disabled: false

outgoing:
  request_timeout: 15.0
  retries: 1
  pool_connections: 2
  pool_maxsize: 1
