services:
  backend:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - RUST_LOG=info

  frontend:
    build:
      context: ../fantastic_battle_frontend
      target: runtime
    ports:
      - "80:80"
    depends_on:
      - backend
