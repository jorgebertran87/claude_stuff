services:

  prices_comparer:
    image: ${RUN_IMAGE:-prices-comparer}
    restart: unless-stopped
    # root so the bot can read the mounted Claude credentials (HOME=/root) and
    # the world-writable /data shared volume.
    user: root
    env_file:
      - .env           # copy .env.example → .env and fill in your values
    volumes:
      # Shared with mitmproxy: the capturer writes the Glovo token here and
      # the bot reads it back (see GLOVO_TOKEN_FILE, default /data/glovo_token).
      - glovo_state:/data
      # Claude Code CLI: auth from the host login, plus the order-normalizer skill.
      - ${HOME}/.claude.json:/root/.claude.json
      - ${HOME}/.claude:/root/.claude
      - ./.claude:/app/.claude:ro
    depends_on:
      init_perms:
        condition: service_completed_successfully
      flaresolverr:
        condition: service_healthy

  # A fresh named volume is created root:root 0755, but neither the bot
  # (appuser) nor mitmproxy (its entrypoint drops to the mitmproxy user) runs
  # as root — so make the shared /data group/other-writable before they start.
  init_perms:
    image: busybox
    command: chmod 0777 /data
    volumes:
      - glovo_state:/data

  # FlareSolverr — bypasses Cloudflare for the Dia source.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # mitmproxy — proxy your phone through this; the addon watches Glovo
  # traffic and writes the captured bearer token to the shared volume.
  # Point your device's HTTP proxy at <pequenin-tailscale-ip>:8080 and
  # install the mitmproxy CA. See capture/README.md (cert pinning caveat).
  glovo_capture:
    image: mitmproxy/mitmproxy:latest
    restart: unless-stopped
    command: >
      mitmdump --set confdir=/data/mitmproxy
      -s /addon/glovo_token.py
    ports:
      - "8080:8080"      # HTTP/S proxy the phone connects to
    volumes:
      - ./capture/glovo_token.py:/addon/glovo_token.py:ro
      - glovo_state:/data
    depends_on:
      init_perms:
        condition: service_completed_successfully

volumes:
  glovo_state:
